<ion-header>
  <ion-toolbar>
    <ion-title>English Coach</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-shell">
  <div class="dashboard-page">
    <section class="hero-panel">
      <div class="hero-top">
        <div class="avatar-chip">{{ userInitials }}</div>
        <div class="hero-copy">
          <span class="eyebrow">Welcome back</span>
          <h1>{{ firstName }}</h1>
          <p>Build speaking confidence with short, daily practice modules.</p>
        </div>
      </div>

      @if (showOnboardingButton) {
        <button type="button" class="onboarding-pill" (click)="go('/onboarding')">
          Complete onboarding
        </button>
      }
    </section>

    <section class="feature-grid">
      <button
        *ngFor="let item of quickLinks"
        type="button"
        class="feature-card"
        [attr.data-accent]="item.accent"
        (click)="go(item.route)"
      >
        <span class="card-kicker">Practice</span>
        <strong>{{ item.title }}</strong>
        <span>{{ item.subtitle }}</span>
      </button>
    </section>

    <ion-button expand="block" fill="outline" color="danger" class="logout-button" (click)="logout()">
      Logout
    </ion-button>
  </div>
</ion-content>

<div class="user-dock">
  <button type="button" class="dock-item" (click)="go('/subscriptions')">
    <span class="dock-icon">S</span>
    <span>Subscriptions</span>
  </button>
  <button type="button" class="dock-item dock-item--primary" (click)="go('/profile')">
    <span class="dock-icon">{{ userInitials }}</span>
    <span>Profile</span>
  </button>
</div>
