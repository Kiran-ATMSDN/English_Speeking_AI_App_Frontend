<ion-header>
  <ion-toolbar>
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Main Menu</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      @if (showOnboardingButton) {
        <ion-button expand="block" (click)="go('/onboarding')">Onboarding</ion-button>
      }
      <ion-button expand="block" (click)="go('/subscriptions')">Subscriptions</ion-button>
      <ion-button expand="block" (click)="go('/mentor')">AI Mentor Chat</ion-button>
      <ion-button expand="block" (click)="go('/conversation')">Conversation Session</ion-button>
      <ion-button expand="block" (click)="go('/speech')">Speech To Text</ion-button>
      <ion-button expand="block" (click)="go('/daily-vocabulary')">Daily Vocabulary</ion-button>
      <ion-button expand="block" (click)="go('/grammar-lessons')">Grammar Lessons</ion-button>
      <ion-button expand="block" (click)="go('/common-sentences')">Common English Sentences</ion-button>
      <ion-button expand="block" (click)="go('/conversation-scripts')">Conversation Scripts</ion-button>
      <ion-button expand="block" (click)="go('/pronunciation-tips')">Pronunciation Tips</ion-button>
      <ion-button expand="block" (click)="go('/profile')">Profile</ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="logout()">Logout</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
