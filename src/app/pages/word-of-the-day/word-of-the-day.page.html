<ion-header>
  <ion-toolbar>
    <ion-title>Word of the Day</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Word of the Day</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-note>Day {{ dayNumber }} / {{ totalDays }} | Level: {{ level }}</ion-note>
      <div class="controls">
        <ion-button size="small" fill="outline" (click)="previousDay()" [disabled]="loading || currentDay <= 1">Previous Day</ion-button>
        <ion-button size="small" fill="outline" (click)="goToDayOne()" [disabled]="loading">Day 1</ion-button>
        <ion-button size="small" fill="outline" (click)="nextDay()" [disabled]="loading || currentDay >= totalDays">Next Day</ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-content>
      <h2>{{ word.word }}</h2>
      <p><strong>Meaning (English):</strong> {{ word.meaningEn }}</p>
      <p><strong>Meaning (Hindi):</strong> {{ word.meaningHi }}</p>
      <p><strong>Example:</strong> {{ word.example }}</p>
      <p *ngIf="word.tip"><strong>Tip:</strong> {{ word.tip }}</p>
      <ion-button size="small" (click)="speakWord()">Speak</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" fill="outline" (click)="back()">Back</ion-button>
</ion-content>
