<ion-header>
  <ion-toolbar>
    <ion-title>Speech To Text</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="module-shell">
  <div class="module-page">
    <section class="module-hero">
      <span class="module-kicker">Voice Capture</span>
      <h1>Speech Lab</h1>
      <p class="module-subtitle">Upload an audio file and turn speech into editable text in one clean workspace.</p>
      <div class="module-meta">
        <span class="module-badge">{{ selectedFileName || 'No file selected' }}</span>
      </div>
    </section>

    <ion-card class="module-card">
      <ion-card-content>
        <div class="speech-form">
          <label class="upload-chip upload-chip--wide">
            <ion-icon name="cloud-upload-outline"></ion-icon>
            <span>{{ selectedFileName || 'Choose Audio File' }}</span>
            <input type="file" accept="audio/*" (change)="onAudioSelected($event)" />
          </label>

          <label class="field-label" for="transcribed-text">Transcribed Text</label>
          <ion-item lines="none" class="conversation-textarea">
            <ion-textarea
              id="transcribed-text"
              [value]="transcribedText"
              rows="7"
              readonly="true"
              placeholder="Your transcript will appear here..."
            ></ion-textarea>
          </ion-item>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" fill="outline" class="back-button" (click)="back()">Back</ion-button>
  </div>
</ion-content>
