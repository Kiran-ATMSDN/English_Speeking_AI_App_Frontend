<ion-header>
  <ion-toolbar>
    <ion-title>Onboarding</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Learning Purpose</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      @if (question) {
        <ion-item lines="none">
          <ion-label>{{ question.questionText }}</ion-label>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Select Purpose</ion-label>
          <select
            style="width: 100%; margin-top: 8px; padding: 10px"
            [(ngModel)]="answerText"
          >
            <option value="">Choose one purpose</option>
            <option value="Basic Practice">Basic Practice</option>
            <option value="Interview Preparation">Interview Preparation</option>
            <option value="Improve Communication Skills">Improve Communication Skills</option>
            <option value="Build Public Speaking Confidence">Build Public Speaking Confidence</option>
          </select>
        </ion-item>
        <ion-button
          expand="block"
          class="ion-margin-top"
          (click)="saveAnswer()"
          [disabled]="loading || !answerText.trim()"
        >
          Save Answer
        </ion-button>
      } @else {
        <ion-text>No question found.</ion-text>
      }

      <ion-button expand="block" fill="outline" class="ion-margin-top" (click)="back()">Back</ion-button>

    </ion-card-content>
  </ion-card>
</ion-content>
